<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">

<div class="logo-area">
<img src="papelaria-kaori.webp" class="logo-img" loading="lazy">
<span class="logo-text">Kaori Paper</span>
</div>

<nav class="menu">
<a href="index.html">Home</a>
<a href="produtos.html">Loja</a>
<a href="contato.html">Contato</a>
</nav>

</header>

<section class="loja">

<aside class="filtro">
    <h3>Categorias</h3>
    
    <input type="text" id="buscaInput" placeholder="Buscar produtos..." 
           onkeyup="buscar(this.value)" class="busca">

    <ul id="listaCategorias">
        <li onclick="filtrar('todos')">Todos</li>
        <li onclick="filtrar('adesivo')">Adesivos</li>
        <li onclick="filtrar('papelaria')">Papelaria</li>
        <li onclick="filtrar('eventos')">Eventos</li>
    </ul>
</aside>

<div class="area-produtos">

<div id="gridProdutos" class="produtos-grid"></div>

<div class="paginacao">
<button onclick="mudarPagina(-1)">◀</button>
<span id="numPagina">1</span>
<button onclick="mudarPagina(1)">▶</button>
</div>

</div>

</section>

<footer class="rodape">
Kaori Paper © 2026
</footer>

<div class="fav-float" onclick="abrirFav()">❤️</div>

<div id="painelFav" class="painel-fav">

<button class="fechar-fav" onclick="fecharFav()">✕</button>

<h3>Seus favoritos ❤️</h3>

<div id="listaFav"></div>

</div>

<a href="https://wa.me/5562991008898" class="wpp-float">💬</a>
<a href="carrinho.html" class="cart-float">🛒</a>

<script type="module" src="js/loja.js"></script>
<script src="js/favoritos-global.js" defer></script>
<script src="js/favoritos.js" defer></script>


</body>
</html>
